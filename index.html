<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Media Daily News</title>

  <style>
    :root {
      --era-pink: #ff2e63;
      --era-orange: #ff7a1a;
      --era-purple: #7c3cff;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.66);
      --card: rgba(10, 10, 10, 0.76);
      --border: rgba(255, 255, 255, 0.15);
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--text);
      background: #050505;
      font-family: Arial, Helvetica, "Liberation Sans", sans-serif;
    }

    body {
      background:
        linear-gradient(115deg, rgba(0, 0, 0, 0.96) 0%, rgba(0, 0, 0, 0.86) 48%, rgba(0, 0, 0, 0.58) 100%),
        linear-gradient(135deg, #111111 0%, #050505 58%, #190815 100%);
    }

    .background-accent {
      position: fixed;
      right: -240px;
      bottom: -280px;
      width: 720px;
      height: 720px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 46, 99, 0.34), rgba(124, 60, 255, 0.18) 42%, transparent 68%);
      z-index: 0;
    }

    .brand-mark {
      position: fixed;
      top: 58px;
      left: 72px;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 14px;
      letter-spacing: 0.18em;
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .brand-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--era-pink);
    }

    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      width: 100vw;
      padding: 72px;
      display: grid;
      grid-template-columns: 0.9fr 1.25fr;
      align-items: center;
      gap: 72px;
    }

    .hero { padding-top: 48px; }

    .eyebrow {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.24em;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .title {
      margin: 0;
      font-size: 112px;
      line-height: 0.9;
      letter-spacing: -0.08em;
      font-weight: 800;
      text-transform: uppercase;
      max-width: 800px;
    }

    .accent-line {
      width: 250px;
      height: 8px;
      margin-top: 36px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--era-pink), var(--era-orange), var(--era-purple));
    }

    .source-note {
      margin-top: 28px;
      color: var(--muted);
      font-size: 19px;
      line-height: 1.35;
      max-width: 420px;
    }

    .news-card {
      justify-self: end;
      width: 100%;
      min-height: 620px;
      padding: 48px;
      border: 1px solid var(--border);
      border-radius: 36px;
      background: var(--card);
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.45);
      position: relative;
      overflow: hidden;
    }

    .news-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 7px;
      border-radius: 36px 36px 0 0;
      background: linear-gradient(90deg, var(--era-pink), var(--era-orange), var(--era-purple));
    }

    .card-label {
      color: var(--muted);
      font-size: 19px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 34px;
    }

    .headline-list {
      display: grid;
      gap: 24px;
    }

    .item {
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 20px;
      align-items: start;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .item:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .number {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .headline {
      margin: 0;
      font-size: 31px;
      line-height: 1.12;
      letter-spacing: -0.035em;
      font-weight: 800;
    }

    .summary {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 20px;
      line-height: 1.32;
      max-height: 54px;
      overflow: hidden;
    }

    .status {
      color: var(--muted);
      font-size: 26px;
      line-height: 1.3;
      margin-top: 120px;
    }

    @media (max-width: 900px) {
      .brand-mark { top: 36px; left: 36px; }

      .page {
        padding: 36px;
        grid-template-columns: 1fr;
        gap: 36px;
        align-content: center;
      }

      .hero { padding-top: 64px; }
      .title { font-size: 72px; }

      .news-card {
        min-height: 480px;
        padding: 34px;
      }

      .headline { font-size: 25px; }
      .summary { font-size: 17px; }
    }
  </style>
</head>

<body>
  <div class="background-accent"></div>

  <div class="brand-mark">
    <div class="brand-dot"></div>
    We Are Era
  </div>

  <main class="page">
    <section class="hero" aria-label="News source">
      <div class="eyebrow">MediaPost</div>
      <h1 class="title">Media Daily News</h1>
      <div class="accent-line"></div>
      <div class="source-note">Live industry headlines, refreshed automatically.</div>
    </section>

    <section class="news-card" aria-label="MediaDailyNews headlines">
      <div class="card-label">Latest highlights</div>
      <div id="news" class="headline-list">
        <div class="status">Loading news...</div>
      </div>
    </section>
  </main>

  <script>
    var RSS_FEED = 'http://feeds.mediapost.com/mediadailynews';
    var lastSuccessfulHtml = '';

    function buildUrls() {
      var cache = '?_=' + new Date().getTime();
      return [
        RSS_FEED + cache,
        'https://api.allorigins.win/raw?url=' + encodeURIComponent(RSS_FEED + cache),
        'https://corsproxy.io/?' + encodeURIComponent(RSS_FEED + cache),
        'https://r.jina.ai/http://r.jina.ai/http://r.jina.ai/http://' + RSS_FEED.replace(/^https?:\/\//, '') + cache
      ];
    }

    function clean(text) {
      return String(text || '').replace(/\s+/g, ' ').trim();
    }

    function stripHtml(html) {
      var temp = document.createElement('div');
      temp.innerHTML = html || '';
      return clean(temp.textContent || temp.innerText || '');
    }

    function escapeHtml(text) {
      return clean(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function shortText(text, maxLength) {
      text = clean(text);
      if (!text) return '';
      if (text.length <= maxLength) return text;
      return text.substring(0, maxLength).replace(/\s+\S*$/, '') + '...';
    }

    function getNodeText(item, tagName) {
      var node = item.getElementsByTagName(tagName)[0];
      return node ? stripHtml(node.textContent || '') : '';
    }

    function renderItems(items) {
      var container = document.getElementById('news');
      var html = '';
      var count = 0;

      for (var i = 0; i < items.length && count < 5; i++) {
        var item = items[i];
        var title = getNodeText(item, 'title');
        var description = getNodeText(item, 'description');

        if (!title || title.length < 4) continue;
        if (description === title) description = '';

        count++;

        html += '<article class="item">' +
          '<div class="number">' + count + '</div>' +
          '<div>' +
            '<h2 class="headline">' + escapeHtml(shortText(title, 96)) + '</h2>' +
            '<p class="summary">' + escapeHtml(shortText(description, 145)) + '</p>' +
          '</div>' +
        '</article>';
      }

      if (html) {
        container.innerHTML = html;
        lastSuccessfulHtml = html;
      } else if (!lastSuccessfulHtml) {
        container.innerHTML = '<div class="status">No headlines found.</div>';
      }
    }

    function parseXmlItems(responseText) {
      var parser = new DOMParser();
      var xml = parser.parseFromString(responseText, 'text/xml');
      return xml.getElementsByTagName('item');
    }

    function loadFromUrl(urls, index) {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', urls[index], true);
      xhr.timeout = 12000;

      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4) {
          if (xhr.status >= 200 && xhr.status < 300) {
            var items = parseXmlItems(xhr.responseText);

            if (items.length > 0) {
              renderItems(items);
            } else if (index + 1 < urls.length) {
              loadFromUrl(urls, index + 1);
            } else if (!lastSuccessfulHtml) {
              document.getElementById('news').innerHTML = '<div class="status">News feed returned no items.</div>';
            }
          } else if (index + 1 < urls.length) {
            loadFromUrl(urls, index + 1);
          } else if (!lastSuccessfulHtml) {
            document.getElementById('news').innerHTML = '<div class="status">News temporarily unavailable.</div>';
          }
        }
      };

      xhr.ontimeout = function () {
        if (index + 1 < urls.length) {
          loadFromUrl(urls, index + 1);
        } else if (!lastSuccessfulHtml) {
          document.getElementById('news').innerHTML = '<div class="status">News request timed out.</div>';
        }
      };

      xhr.onerror = function () {
        if (index + 1 < urls.length) {
          loadFromUrl(urls, index + 1);
        } else if (!lastSuccessfulHtml) {
          document.getElementById('news').innerHTML = '<div class="status">News temporarily unavailable.</div>';
        }
      };

      xhr.send();
    }

    function loadNews() {
      loadFromUrl(buildUrls(), 0);
    }

    loadNews();
    setInterval(loadNews, 300000);

    setTimeout(function () {
      window.location.reload();
    }, 21600000);
  </script>
</body>
</html>
