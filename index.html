<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Media Daily News</title>

  <style>
    :root {
      --era-pink: #ff2e63;
      --era-orange: #ff7a1a;
      --era-purple: #7c3cff;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.66);
      --card: rgba(10, 10, 10, 0.76);
      --border: rgba(255, 255, 255, 0.15);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%; margin: 0; overflow: hidden;
      color: var(--text); background: #050505;
      font-family: Arial, Helvetica, "Liberation Sans", sans-serif;
    }

    body {
      background:
        linear-gradient(115deg, rgba(0,0,0,0.96), rgba(0,0,0,0.58)),
        linear-gradient(135deg,#111,#050505,#190815);
    }

    .background-accent {
      position: fixed; right: -240px; bottom: -280px;
      width: 720px; height: 720px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,46,99,0.34), rgba(124,60,255,0.18) 42%, transparent 68%);
      z-index: 0;
    }

    .brand-mark {
      position: fixed; top: 58px; left: 72px; z-index: 2;
      display: flex; align-items: center; gap: 14px;
      letter-spacing: 0.18em; font-size: 16px; font-weight: 800; text-transform: uppercase;
    }

    .brand-dot { width: 13px; height: 13px; border-radius: 50%; background: var(--era-pink); }

    .page {
      position: relative; z-index: 1; height: 100vh; width: 100vw;
      padding: 72px; display: grid; grid-template-columns: 0.9fr 1.25fr; gap: 72px; align-items: center;
    }

    .title {
      margin: 0; font-size: 112px; line-height: 0.9;
      letter-spacing: -0.08em; font-weight: 800; text-transform: uppercase;
    }

    .accent-line {
      width: 250px; height: 8px; margin-top: 36px; border-radius: 999px;
      background: linear-gradient(90deg, var(--era-pink), var(--era-orange), var(--era-purple));
    }

    .news-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 36px; padding: 48px;
    }

    .item { margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 16px; }
    .headline { font-size: 28px; font-weight: 800; margin: 0 0 6px; }
    .summary { font-size: 18px; color: var(--muted); }
    .status { font-size: 22px; color: var(--muted); }
  </style>
</head>
<body>

<div class="background-accent"></div>

<div class="brand-mark">
  <div class="brand-dot"></div>
  We Are Era
</div>

<main class="page">
  <div>
    <h1 class="title">News</h1>
    <div class="accent-line"></div>
  </div>

  <div class="news-card">
    <div id="news">
      <div class="status">Loading headlines...</div>
    </div>
  </div>
</main>

<script>
  var RSS_FEED = 'http://feeds.mediapost.com/mediadailynews';
  var STORAGE_KEY = 'era-news-cache';

  function buildUrls() {
    var cache = '?_=' + new Date().getTime();
    return [
      'https://api.allorigins.win/raw?url=' + encodeURIComponent(RSS_FEED + cache),
      'https://corsproxy.io/?' + encodeURIComponent(RSS_FEED + cache)
    ];
  }

  function stripHtml(html) {
    var div = document.createElement('div');
    div.innerHTML = html || '';
    return (div.textContent || '').trim();
  }

  function render(items) {
    var container = document.getElementById('news');
    var html = '';

    for (var i = 0; i < items.length && i < 5; i++) {
      var item = items[i];
      var title = stripHtml(item.getElementsByTagName('title')[0].textContent);
      var desc = stripHtml(item.getElementsByTagName('description')[0].textContent);

      html += '<div class="item">' +
        '<div class="headline">' + title + '</div>' +
        '<div class="summary">' + desc.substring(0,120) + '</div>' +
      '</div>';
    }

    if (html) {
      container.innerHTML = html;
      localStorage.setItem(STORAGE_KEY, html);
    }
  }

  function loadFrom(urls, i) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', urls[i], true);
    xhr.onreadystatechange = function () {
      if (xhr.readyState === 4) {
        if (xhr.status >= 200 && xhr.status < 300) {
          var parser = new DOMParser();
          var xml = parser.parseFromString(xhr.responseText, 'text/xml');
          var items = xml.getElementsByTagName('item');
          if (items.length > 0) render(items);
          else if (i + 1 < urls.length) loadFrom(urls, i + 1);
        } else if (i + 1 < urls.length) {
          loadFrom(urls, i + 1);
        }
      }
    };
    xhr.send();
  }

  function loadNews() {
    var cached = localStorage.getItem(STORAGE_KEY);
    if (cached) document.getElementById('news').innerHTML = cached;

    loadFrom(buildUrls(), 0);
  }

  loadNews();
  setInterval(loadNews, 300000);
</script>

</body>
</html>
