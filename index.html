<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digiday Highlights</title>

  <style>
    :root {
      --era-pink: #ff2e63;
      --era-orange: #ff7a1a;
      --era-purple: #7c3cff;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.66);
      --card: rgba(10, 10, 10, 0.76);
      --border: rgba(255, 255, 255, 0.15);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--text);
      background: #050505;
      font-family: Arial, Helvetica, "Liberation Sans", sans-serif;
    }

    body {
      background:
        linear-gradient(115deg, rgba(0,0,0,0.96) 0%, rgba(0,0,0,0.86) 48%, rgba(0,0,0,0.58) 100%),
        linear-gradient(135deg, #111111 0%, #050505 58%, #190815 100%);
    }

    .background-accent {
      position: fixed;
      right: -240px;
      bottom: -280px;
      width: 720px;
      height: 720px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,46,99,0.34), rgba(124,60,255,0.18) 42%, transparent 68%);
      z-index: 0;
    }

    .brand-mark {
      position: fixed;
      top: 58px;
      left: 72px;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 14px;
      letter-spacing: 0.18em;
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .brand-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--era-pink);
    }

    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      width: 100vw;
      padding: 72px;
      display: grid;
      grid-template-columns: 0.9fr 1.25fr;
      align-items: center;
      gap: 72px;
    }

    .hero { padding-top: 48px; }

    .eyebrow {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.24em;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .title {
      margin: 0;
      font-size: 112px;
      line-height: 0.9;
      letter-spacing: -0.08em;
      font-weight: 800;
      text-transform: uppercase;
      max-width: 800px;
    }

    .accent-line {
      width: 250px;
      height: 8px;
      margin-top: 36px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--era-pink), var(--era-orange), var(--era-purple));
    }

    .news-card {
      justify-self: end;
      width: 100%;
      min-height: 620px;
      padding: 48px;
      border: 1px solid var(--border);
      border-radius: 36px;
      background: var(--card);
      box-shadow: 0 28px 70px rgba(0,0,0,0.45);
      position: relative;
      overflow: hidden;
    }

    .news-card:before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 7px;
      border-radius: 36px 36px 0 0;
      background: linear-gradient(90deg, var(--era-pink), var(--era-orange), var(--era-purple));
    }

    .card-label {
      color: var(--muted);
      font-size: 19px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 34px;
    }

    .headline-list {
      display: grid;
      gap: 24px;
    }

    .item {
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 20px;
      align-items: start;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }

    .item:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .number {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      background: rgba(255,255,255,0.08);
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.14);
    }

    .headline {
      margin: 0;
      font-size: 31px;
      line-height: 1.12;
      letter-spacing: -0.035em;
      font-weight: 800;
    }

    .summary {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 20px;
      line-height: 1.32;
      max-height: 54px;
      overflow: hidden;
    }

    .status {
      color: var(--muted);
      font-size: 26px;
      line-height: 1.3;
      margin-top: 120px;
    }
  </style>
</head>

<body>
  <div class="background-accent"></div>

  <div class="brand-mark">
    <div class="brand-dot"></div>
    We Are Era
  </div>

  <main class="page">
    <section class="hero">
      <div class="eyebrow">Digiday</div>
      <h1 class="title">Online<br>Media<br>News</h1>
      <div class="accent-line"></div>
    </section>

    <section class="news-card">
      <div class="card-label">Latest highlights</div>
      <div id="news" class="headline-list">
        <div class="status">Loading Digiday news...</div>
      </div>
    </section>
  </main>

  <script>
    var RSS_FEED = 'https://digiday.com/feed/';
    var MAX_ITEMS = 5;

    function stripHtml(html) {
      var temp = document.createElement('div');
      temp.innerHTML = html || '';
      return (temp.textContent || temp.innerText || '').replace(/\s+/g, ' ').trim();
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function shortText(text, maxLength) {
      if (!text) return '';
      if (text.length <= maxLength) return text;
      return text.substring(0, maxLength).replace(/\s+\S*$/, '') + '...';
    }

    function renderNews(items) {
      var container = document.getElementById('news');
      var html = '';
      var count = Math.min(items.length, MAX_ITEMS);

      for (var i = 0; i < count; i++) {
        var title = stripHtml(items[i].title || '');
        var description = stripHtml(items[i].description || items[i].content || '');

        html += '<article class="item">' +
          '<div class="number">' + (i + 1) + '</div>' +
          '<div>' +
            '<h2 class="headline">' + escapeHtml(title) + '</h2>' +
            '<p class="summary">' + escapeHtml(shortText(description, 145)) + '</p>' +
          '</div>' +
        '</article>';
      }

      container.innerHTML = html || '<div class="status">No Digiday headlines found.</div>';
    }

    function parseXml(xmlText) {
      var parser = new DOMParser();
      var xml = parser.parseFromString(xmlText, 'text/xml');
      var nodes = xml.getElementsByTagName('item');
      var items = [];

      for (var i = 0; i < nodes.length; i++) {
        var titleNode = nodes[i].getElementsByTagName('title')[0];
        var descNode = nodes[i].getElementsByTagName('description')[0];

        items.push({
          title: titleNode ? titleNode.textContent : '',
          description: descNode ? descNode.textContent : ''
        });
      }

      return items;
    }

    function loadRss2Json(success, fail) {
      var callbackName = 'digidayCallback_' + new Date().getTime();
      var script = document.createElement('script');
      var timeout;

      window[callbackName] = function(data) {
        clearTimeout(timeout);

        if (data && data.items && data.items.length) {
          success(data.items);
        } else {
          fail();
        }

        cleanup();
      };

      function cleanup() {
        try {
          delete window[callbackName];
        } catch (e) {
          window[callbackName] = null;
        }

        if (script.parentNode) {
          script.parentNode.removeChild(script);
        }
      }

      script.onerror = function() {
        clearTimeout(timeout);
        cleanup();
        fail();
      };

      timeout = setTimeout(function() {
        cleanup();
        fail();
      }, 12000);

      script.src =
        'https://api.rss2json.com/v1/api.json?rss_url=' +
        encodeURIComponent(RSS_FEED) +
        '&callback=' +
        callbackName +
        '&_=' +
        new Date().getTime();

      document.body.appendChild(script);
    }

    function loadAllOrigins(success, fail) {
      var xhr = new XMLHttpRequest();
      var url =
        'https://api.allorigins.win/raw?url=' +
        encodeURIComponent(RSS_FEED) +
        '&_=' +
        new Date().getTime();

      xhr.open('GET', url, true);

      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status >= 200 && xhr.status < 300 && xhr.responseText) {
            try {
              var items = parseXml(xhr.responseText);

              if (items.length) {
                success(items);
              } else {
                fail();
              }
            } catch (e) {
              fail();
            }
          } else {
            fail();
          }
        }
      };

      xhr.onerror = function() {
        fail();
      };

      xhr.send();
    }

    function showUnavailable() {
      document.getElementById('news').innerHTML =
        '<div class="status">Digiday news is temporarily unavailable.</div>';
    }

    function loadNews() {
      document.getElementById('news').innerHTML =
        '<div class="status">Loading Digiday news...</div>';

      loadRss2Json(
        function(items) {
          renderNews(items);
        },
        function() {
          loadAllOrigins(
            function(items) {
              renderNews(items);
            },
            function() {
              showUnavailable();
            }
          );
        }
      );
    }

    loadNews();
    setInterval(loadNews, 900000);

    setTimeout(function() {
      window.location.reload();
    }, 86400000);
  </script>
</body>
</html>
